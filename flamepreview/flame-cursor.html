<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purple Flame Cursor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      cursor: none;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      image-rendering: pixelated;
      z-index: 9999;
    }
  </style>
</head>
<body>
<canvas id="flame-canvas"></canvas>
<script>
  const canvas = document.getElementById('flame-canvas');
  const ctx = canvas.getContext('2d');
  const P = 3;

  let W, H;
  let mouse = { x: -999, y: -999, active: false };
  let petX = -999, petY = -999;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    W = canvas.width;
    H = canvas.height;
  }
  resize();
  window.addEventListener('resize', resize);

  document.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    if (!mouse.active) { petX = mouse.x; petY = mouse.y; }
    mouse.active = true;
  });
  document.addEventListener('mouseleave', () => { mouse.active = false; });

  const COLORS = ['#ffffff', '#e8ccff', '#cc88ff', '#9933ee', '#6600aa'];

  // Cross-shaped orb core
  const ORB = [
            [0,-1],
    [-1,0],[0, 0],[1, 0],
            [0, 1],
  ];

  const sparks = Array.from({ length: 4 }, (_, i) => ({
    angle: (i / 4) * Math.PI * 2,
    radius: 1.8,
    speed: 0.03 + Math.random() * 0.015,
    phase: Math.random() * Math.PI * 2,
    phaseSpeed: 0.05,
  }));

  let t = 0;

  function draw() {
    ctx.clearRect(0, 0, W, H);

    if (!mouse.active) { requestAnimationFrame(draw); return; }

    petX += (mouse.x - petX) * 0.2;
    petY += (mouse.y - petY) * 0.2;
    t++;

    const bx = Math.round(petX / P) * P;
    const by = Math.round(petY / P) * P;

    // Orb core
    for (const [ox, oy] of ORB) {
      const dist = Math.sqrt(ox * ox + oy * oy);
      const colIdx = Math.min(COLORS.length - 1, Math.floor(dist / 1.5 * COLORS.length));
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = COLORS[colIdx];
      ctx.fillRect(bx + ox * P, by + oy * P, P, P);
    }

    // Orbiting sparks
    for (const s of sparks) {
      s.angle += s.speed;
      s.phase += s.phaseSpeed;
      const r = s.radius + Math.sin(s.phase) * 0.5;
      const sx = Math.round(Math.cos(s.angle) * r) * P;
      const sy = Math.round(Math.sin(s.angle) * r) * P;
      ctx.globalAlpha = 0.4 + 0.3 * Math.sin(s.phase);
      ctx.fillStyle = '#aa55ff';
      ctx.fillRect(bx + sx, by + sy, P, P);
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
